name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/pest --coverage

      - name: Verify package archive
        run: composer archive --format=zip --dir=/tmp

  verify:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Required checks passed
        run: echo "All required CI checks passed."

  tag:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump and create tag
        run: |
          # The first public release for this package is v0.1.0. Ignore accidental
          # v0.0.x tags if they exist from earlier workflow attempts.
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Ev '^v0\.0\.' | head -n1 || true)

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.1.0"
            echo "Latest release tag: none"
            echo "New tag: $NEW_TAG"

            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            exit 0
          fi

          echo "Latest release tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Check commit messages since last tag for bump type
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^breaking[:(]|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "Bump: major"
          elif echo "$COMMITS" | grep -qiE "^feat[:(]"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "Bump: minor"
          else
            PATCH=$((PATCH + 1))
            echo "Bump: patch"
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [verify, tag]
    if: github.event_name == 'push' && github.ref == 'refs/heads/release' && needs.tag.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: gh release create ${{ steps.tag.outputs.name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Packagist
        run: |
          curl -XPOST \
            -H 'Content-Type: application/json' \
            'https://packagist.org/api/update-package?username=thekiharani&apiToken=${{ secrets.PACKAGIST_TOKEN }}' \
            -d '{"repository":{"url":"https://github.com/thekiharani/laravel-payments"}}'
